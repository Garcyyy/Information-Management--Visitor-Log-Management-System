{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body>

<div class="dashboard-layout">

    <aside class="sidebar">
        <h2>Visitor Log</h2>

        <a href="/dashboard/">Dashboard</a>
        <a href="/visitors/">Visitors</a>
        <a href="/departments/">Departments</a>
        <a href="/persons/">Persons</a>
        <a href="/visit-logs/">Visit Logs</a>
        <a href="/logout/">Logout</a>
    </aside>

    <main class="main-content">

        <div class="topbar">
            <div>
                <h1>{{ title }}</h1>
                <p>Please confirm if you want to delete this record.</p>
            </div>
        </div>

        <section class="table-section">
            <h2>Are you sure?</h2>
            <p style="margin-top: 10px; margin-bottom: 25px;">
                You are about to delete: <strong>{{ object }}</strong>
            </p>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="delete">Yes, Delete</button>
                <a href="{% url cancel_url %}" class="edit">Cancel</a>
            </form>
        </section>

    </main>

</div>

</body>
</html>
